name: Terraform Apply

on:
  push:
    branches: [main]
    paths:
      - "**.tf"
      - "**.tfvars"

permissions:
  contents: read
  pull-requests: write
  id-token: write

env:
  TF_WORKING_DIR: "terraform"
  AWS_REGION: "us-west-2"
  IAM_ROLE_ARN: "arn:aws:iam::448479419844:role/github-actions-kiro-headless-tf"                         # Set after deploying cloudformation/github-oidc-terraform.yml (see RoleArn output)

jobs:
  terraform-apply:
    name: Apply
    runs-on: ubuntu-latest
    environment: production  # Requires environment approval in GitHub settings

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.IAM_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_wrapper: false
          # terraform_version: "1.9.0"

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init -input=false

      - name: Terraform Apply
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          set +e
          terraform apply -input=false -auto-approve -no-color 2>&1 | tee apply_output.txt
          APPLY_EXIT_CODE=${PIPESTATUS[0]}
          echo "exit_code=$APPLY_EXIT_CODE" >> "$GITHUB_OUTPUT"
          set -e
        id: apply
        env:
          TF_IN_AUTOMATION: "true"

      - name: Install Kiro CLI
        run: curl -fsSL https://cli.kiro.dev/install | bash

      - name: Generate Apply Summary with Kiro
        id: summary
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          KIRO_API_KEY: ${{ secrets.KIRO_API_KEY }}
          NO_COLOR: "1"
        run: |
          kiro-cli chat \
            --agent terraform-reviewer \
            --no-interactive \
            --trust-tools=read,shell \
            "Read the file 'apply_output.txt' and produce a Terraform apply summary. Include the final outputs and any errors. Output ONLY the markdown summary, nothing else." \
            2>/dev/null | sed 's/\x1b\[[0-9;]*m//g' > raw_output.txt

          sed -n '/^#/,$p' raw_output.txt > summary.md

          if [ ! -s summary.md ]; then
            cp raw_output.txt summary.md
          fi

      - name: Find merged PR
        id: find_pr
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { data: prs } = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
            });
            const merged = prs.find(pr => pr.merged_at);
            if (merged) {
              core.setOutput('pr_number', merged.number);
            } else {
              core.setOutput('pr_number', '');
            }

      - name: Comment Apply Summary on PR
        if: steps.find_pr.outputs.pr_number != ''
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const summary = fs.readFileSync('${{ env.TF_WORKING_DIR }}/summary.md', 'utf8');
            const prNumber = parseInt('${{ steps.find_pr.outputs.pr_number }}');

            const marker = '<!-- kiro-terraform-apply -->';
            const body = `${marker}\n${summary}`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }

      - name: Fail if apply failed
        if: steps.apply.outputs.exit_code != '0'
        run: exit 1